# Cache path — http-context directive; this file is included inside the
# nginx http {} block so a top-level directive lands in the right scope.
proxy_cache_path /var/cache/nginx/arcmath levels=1:2 keys_zone=arcmath_cache:10m
                 max_size=200m inactive=60m use_temp_path=off;

# Bypass rules: any request carrying a NextAuth session cookie should
# never be cached or served from cache. We match the substring
# "session-token=" in the Cookie header — covers both the prod
# `__Secure-next-auth.session-token` and the dev `arcmath.dev.session-token`
# cookie names without us hard-coding either.
map $http_cookie $arcmath_cache_bypass {
    default              0;
    "~*session-token="   1;
}

# Vary cache by locale so EN and ZH visitors get the right rendered HTML.
# Cookie name is `arcmath.locale`; missing → default English.
map $cookie_arcmath_locale $arcmath_cache_locale {
    default "en";
    "zh"    "zh";
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name arcscience.forecaster-ai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main
server {
    listen 443 ssl http2;
    server_name arcscience.forecaster-ai.com;

    ssl_certificate     /etc/letsencrypt/live/arcscience.forecaster-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arcscience.forecaster-ai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ====== TLS perf (added 2026-05-28) ======
    # Modern cipher suite. TLS 1.3 picks its own ciphers; the list below
    # only matters for TLS 1.2 fallback. "HIGH" was too permissive and
    # could negotiate slow legacy ciphers.
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Session resumption — return visitors skip the full handshake.
    # 10MB shared cache holds ~40k sessions; 1d timeout is comfortable.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — nginx fetches OCSP from the CA periodically and
    # serves it inline so the browser doesn't have to do its own
    # OCSP round-trip to Let's Encrypt (US East, slow from HK).
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout    5s;

    # ====== 全局限制 ======
    client_max_body_size 10M;
    limit_req zone=arcmath_app burst=200 nodelay;

    # ====== gzip ======
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ====== Next.js 静态资源走长缓存 ======
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ====== Next.js 所有其它请求 ======
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 证明题批改可能要 30-60s，留够 buffer
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # ===== Micro-cache for anonymous traffic (added 2026-05-28) =====
        # Logged-in users (session cookie present) bypass the cache entirely.
        # Anonymous users see a cached HTML response for up to 30 seconds,
        # which removes the per-request SSR cost (~300ms) on hot marketing
        # pages: /, /login, /for-schools, /legal/*, etc.
        proxy_cache       arcmath_cache;
        proxy_cache_key   "$scheme$request_method$host$request_uri:$arcmath_cache_locale";
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock  on;
        # Next.js sends `Cache-Control: private, no-cache, no-store` on all
        # dynamic routes — left to its own devices, nginx would honor that
        # and skip the cache entirely. We override here so OUR
        # `proxy_cache_valid 30s` actually takes effect. (We keep respecting
        # `Set-Cookie` though — if upstream tries to set a cookie we DO
        # want to skip caching that response since it's user-specific.)
        proxy_ignore_headers Cache-Control Expires X-Accel-Expires Vary;
        # WebSocket upgrade requests and authenticated requests skip cache.
        proxy_cache_bypass $http_upgrade $arcmath_cache_bypass;
        proxy_no_cache    $http_upgrade $arcmath_cache_bypass;
        # X-Cache-Status surfaces HIT/MISS/BYPASS/EXPIRED so we can verify
        # the cache is doing what we expect. `always` ensures the header is
        # sent even on error responses.
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
