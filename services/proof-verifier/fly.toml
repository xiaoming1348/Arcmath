# Fly.io configuration for the proof-verifier (slim Python-only).
#
# Memory bumped to 2 GB to give SymPy room on multi-variable inequality
# probes; CPU stays shared since SymPy + the autoformalize OpenAI call
# are not CPU-bound.
#
# Autostop on so the cost stays near-zero between sessions.

app = 'arcmath-proof-verifier'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
